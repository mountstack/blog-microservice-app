version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: blog-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped
    networks:
      - blog-network

  minio:
    image: minio/minio
    container_name: blog-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - blog-network

  cloudflare-tunnel:
    image: cloudflare/cloudflared
    container_name: blog-cloudflare-tunnel
    command: tunnel --url http://host.docker.internal:9000
    restart: unless-stopped
    networks:
      - blog-network
    depends_on:
      - minio

volumes:
  minio_data:
    external: true

networks:
  blog-network:
    driver: bridge